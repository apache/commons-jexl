# Migration recipe for JEXL 3.7.0
#
# JEXL 3.7 changed the default permissions to SECURE and the default features to disable
# new(), global side-effects, pragmas, and annotations (and to enable lexical scoping).  If
# your application relied on the previous defaults (RESTRICTED permissions + the pre-3.7
# feature set), load this file via JexlConfigLoader to restore them:
#
#   try (InputStream in = getClass().getResourceAsStream("/jexl.yaml")) {
#       JexlEngine engine = JexlConfigLoader.load(in).create();
#   }
#
# See JexlPermissions.logging() to discover which reflective elements the new
# algorithm denies under your workload.
#
# Every flag is set explicitly so this recipe is immune to any future change of the
# library defaults: the features below reproduce JexlFeatures.createDefault() (the
# pre-3.7 effective feature set) exactly.

permissions:
  base: RESTRICTED

features:
  # Script structure
  script: true
  localVar: true
  lambda: true
  loops: true
  newInstance: true
  # Side-effects
  sideEffect: true
  sideEffectGlobal: true
  # Literals and operators
  structuredLiteral: true
  arrayReferenceExpr: true
  methodCall: true
  annotation: true
  pragma: true
  pragmaAnywhere: true
  namespacePragma: true
  importPragma: true
  namespaceIdentifier: false
  # Lambda arrow styles
  thinArrow: true
  fatArrow: false
  # Variable capture semantics
  constCapture: false
  referenceCapture: false
  # Lexical scoping
  lexical: false
  lexicalShade: false
  # Misc
  comparatorNames: true
  ambiguousStatement: false
  ignoreTemplatePrefix: false
